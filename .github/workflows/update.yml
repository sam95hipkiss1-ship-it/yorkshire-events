name: Update Yorkshire Events Feed

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yorkshire-events-feed
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        env:
          PYTHONUNBUFFERED: '1'
        run: python -u aggregator.py

      - name: Repair missing event dates
        env:
          PYTHONUNBUFFERED: '1'
        run: python -u repair_feed_dates.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/feed.xml
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git diff --staged --quiet || git commit -m "Update events feed - $timestamp"
          git push
