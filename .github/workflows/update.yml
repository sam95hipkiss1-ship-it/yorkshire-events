name: Update Yorkshire Events Feed

on:
  push:
    branches:
      - main
    paths:
      - 'aggregator.py'
      - 'secure_runner.py'
      - 'scrapers/**'
      - 'repair_feed_dates.py'
      - 'propagate_feed_metadata.py'
      - '.github/workflows/update.yml'
  schedule:
    # GitHub cron uses UTC. Running at both 23:05 and 00:05 keeps the feed
    # current just after UK midnight during BST and GMT respectively.
    - cron: '5 23 * * *'
    - cron: '5 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yorkshire-events-feed
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python files
        run: python -m compileall -q aggregator.py secure_runner.py repair_feed_dates.py propagate_feed_metadata.py scrapers

      - name: Run secure aggregator
        env:
          PYTHONUNBUFFERED: '1'
        run: python -u secure_runner.py

      - name: Repair missing event dates
        env:
          PYTHONUNBUFFERED: '1'
        run: python -u repair_feed_dates.py

      - name: Propagate repaired metadata
        env:
          PYTHONUNBUFFERED: '1'
        run: python -u propagate_feed_metadata.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/feed.xml docs/feeds docs/categories docs/sources.json docs/categories.json
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git diff --staged --quiet || git commit -m "Update secure events feeds - $timestamp"
          git push
